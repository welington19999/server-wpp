version: '3.8'

services:
  whatsapp-boot:
    image: node:18-slim
    command: >
      bash -c "
      apt-get update && 
      apt-get install -y git && 
      git clone https://github.com/welington19999/server-wpp.git /tmp/app && 
      cp -r /tmp/app/* /app/ && 
      cd /app && 
      npm install && 
      npm run start
      "
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - whatsapp-sessions:/app/sessions
      - wwwebjs-cache:/app/.wwwebjs_cache
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

volumes:
  whatsapp-sessions:
  wwwebjs-cache: